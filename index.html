<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuniberti & Partners</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #FDF6EE;
            color: #2A1200;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 3rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid #E8D5BE;
        }

        .logo-img {
            max-width: 280px;
            height: auto;
            margin: 0 auto 1.2rem;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: #2A1200;
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 400;
            color: #7A4E28;
            margin-top: 0.5rem;
            letter-spacing: 0.03em;
        }

        main {
            width: 100%;
            max-width: 720px;
            padding: 3rem 2rem;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #A07030;
            margin-bottom: 1.2rem;
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            background: #F5E8D8;
            border: 1px solid #E8D5BE;
            border-radius: 12px;
            text-decoration: none;
            color: #2A1200;
            transition: all 0.2s ease;
        }

        .card:hover {
            background: #EDD9C4;
            border-color: #C8924A;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(160, 112, 48, 0.1);
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .card:nth-child(1) .card-icon { background: rgba(160, 112, 48, 0.15); color: #A07030; }
        .card:nth-child(2) .card-icon { background: rgba(42, 18, 0, 0.08); color: #5C3210; }
        .card:nth-child(3) .card-icon { background: rgba(200, 146, 74, 0.20); color: #A07030; }
        .card:nth-child(4) .card-icon { background: rgba(122, 78, 40, 0.12); color: #7A4E28; }
        .card:nth-child(5) .card-icon { background: rgba(160, 112, 48, 0.18); color: #8B6020; }
        .card:nth-child(6) .card-icon { background: rgba(92, 50, 16, 0.10); color: #5C3210; }

        .card-text {
            flex: 1;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: #2A1200;
        }

        .card-desc {
            font-size: 0.75rem;
            color: #7A4E28;
            margin-top: 0.2rem;
        }

        .card-arrow {
            font-size: 1rem;
            color: #C8924A;
            transition: all 0.2s ease;
        }

        .card:hover .card-arrow {
            color: #A07030;
            transform: translateX(3px);
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #A07030;
        }
    </style>
</head>
<body>

    <header>
        <!-- Logo Cuniberti & Partners -->
        <svg class="logo-img" viewBox="0 0 600 140" xmlns="http://www.w3.org/2000/svg">
            <!-- Hexagonal rosette mark -->
            <g transform="translate(70,70)">
                <!-- Outer ring of 6 overlapping hexagons -->
                <g fill="none" stroke="#2A1200" stroke-width="5.5">
                    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" transform="rotate(0) translate(0,-28)"/>
                    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" transform="rotate(60) translate(0,-28)"/>
                    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" transform="rotate(120) translate(0,-28)"/>
                    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" transform="rotate(180) translate(0,-28)"/>
                    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" transform="rotate(240) translate(0,-28)"/>
                    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" transform="rotate(300) translate(0,-28)"/>
                </g>
                <!-- Inner ring -->
                <g fill="none" stroke="#2A1200" stroke-width="4.5">
                    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" transform="rotate(0) translate(0,-16)"/>
                    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" transform="rotate(60) translate(0,-16)"/>
                    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" transform="rotate(120) translate(0,-16)"/>
                    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" transform="rotate(180) translate(0,-16)"/>
                    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" transform="rotate(240) translate(0,-16)"/>
                    <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" transform="rotate(300) translate(0,-16)"/>
                </g>
            </g>
            <!-- Text: CUNIBERTI -->
            <text x="160" y="52" font-family="'Playfair Display', serif" font-size="42" font-weight="700" fill="#2A1200" letter-spacing="3">CUNIBERTI</text>
            <!-- Text: & PARTNERS -->
            <text x="160" y="90" font-family="'DM Sans', sans-serif" font-size="24" font-weight="400" fill="#2A1200" letter-spacing="8">&amp; PARTNERS</text>
            <!-- Text: MULTI FAMILY OFFICE -->
            <text x="160" y="118" font-family="'DM Sans', sans-serif" font-size="16" font-weight="300" fill="#7A4E28" letter-spacing="5">MULTI FAMILY OFFICE</text>
        </svg>

        <p class="subtitle">Documentazione interna</p>
    </header>

    <main>
        <p class="section-label">Documenti</p>
        <div class="card-list">

            <a href="customer-journey.html" class="card">
                <div class="card-icon">⟡</div>
                <div class="card-text">
                    <div class="card-title">Customer Journey</div>
                </div>
                <span class="card-arrow">→</span>
            </a>

            <a href="dashboard-analisi.html" class="card">
                <div class="card-icon">◈</div>
                <div class="card-text">
                    <div class="card-title">Dashboard Analisi</div>
                </div>
                <span class="card-arrow">→</span>
            </a>

            <a href="dashboard-rendicontazione.html" class="card">
                <div class="card-icon">◉</div>
                <div class="card-text">
                    <div class="card-title">Dashboard Rendicontazione</div>
                </div>
                <span class="card-arrow">→</span>
            </a>

            <a href="dashboard-comitato-investimenti.html" class="card">
                <div class="card-icon">✦</div>
                <div class="card-text">
                    <div class="card-title">Dashboard Comitato Investimenti</div>
                </div>
                <span class="card-arrow">→</span>
            </a>

            <a href="club-deal-immobiliari.html" class="card">
                <div class="card-icon">◆</div>
                <div class="card-text">
                    <div class="card-title">Club Deal Immobiliari</div>
                </div>
                <span class="card-arrow">→</span>
            </a>

            <a href="servizi-di-investimento.html" class="card">
                <div class="card-icon">❖</div>
                <div class="card-text">
                    <div class="card-title">Servizi di Investimento</div>
                </div>
                <span class="card-arrow">→</span>
            </a>

        </div>
    </main>

    <footer>
        &copy; 2026 Cuniberti &amp; Partners. Tutti i diritti riservati.
    </footer>

</body>
</html>
